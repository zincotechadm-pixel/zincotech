name: Criar APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git zip unzip openjdk-17-jdk
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer==1.5.0 cython==0.29.33

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Corrigir sdkmanager para Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager ~/.buildozer/android/platform/android-sdk/tools/bin/avdmanager
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Ajustar buildozer.spec
        run: |
          sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec || true
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec || true
          sed -i 's/^android.archs = .*/android.archs = arm64-v8a/' buildozer.spec || true
          sed -i 's/^requirements = .*/requirements = python3,kivy,pillow,reportlab/' buildozer.spec || true

      - name: Gerar APK
        run: |
          buildozer android debug

      - name: Enviar APK
        uses: actions/upload-artifact@v4
        with:
          name: zincotech-apk
          path: bin/*.apk
