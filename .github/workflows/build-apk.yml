name: Criar APK para Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependências
        run: |
          sudo apt update

          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            build-essential \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache \
            wget \
            curl

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer==1.5.0
          pip install virtualenv

      - name: Configurar Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools

          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip

          unzip sdk.zip

          mkdir -p cmdline-tools/latest

          mv cmdline-tools/* cmdline-tools/latest/ || true

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Instalar SDK + NDK 25b
        run: |
          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Configurar Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin

          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager \
            ~/.buildozer/android/platform/android-sdk/tools/bin/avdmanager

          rm -rf ~/.buildozer/android/platform/android-ndk-r28c || true

          ln -s $ANDROID_HOME/ndk/25.2.9519653 \
            ~/.buildozer/android/platform/android-ndk-r25b

      - name: Build APK
        env:
          ANDROID_NDK_HOME: /home/runner/android-sdk/ndk/25.2.9519653
          ANDROID_NDK_ROOT: /home/runner/android-sdk/ndk/25.2.9519653
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
